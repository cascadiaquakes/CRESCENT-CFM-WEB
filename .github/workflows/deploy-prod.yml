name: Deploy Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "cfm-infra/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  ECR_REPO: cfm-web
  ECS_CLUSTER: default
  ECS_SERVICE: cfm-web-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Authenticate to AWS via OIDC ──────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-cfm-prod

      # ── Login to ECR ──────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push image ────────────────────────────────────
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:prod \
            .

          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:prod

      # ── Deploy via Express Mode API ───────────────────────────
      - name: Update Express Mode service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-express-gateway-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --primary-container "{\"image\":\"$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG\"}"

      # ── Wait for deployment ───────────────────────────────────
      - name: Wait for ECS deployment
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
          && echo "Deployment complete." \
          || echo "Warning: Timed out waiting, but deployment may still be in progress."
