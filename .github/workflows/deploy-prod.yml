name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  ECR_REPO: cfm-web
  ECS_CLUSTER: default
  ECS_SERVICE: cfm-web-prod

jobs:
  deploy:
    if: ${{ inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-cfm-prod

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:prod \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:prod

      - name: Update Express Mode service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          CESIUM_KEYS: ${{ secrets.CESIUM_KEYS }}
        run: |
          SERVICE_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].serviceArn' \
            --output text)

          # Build the full container config with jq to avoid shell escaping issues
          CONTAINER_JSON=$(jq -n \
            --arg image "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" \
            --arg cesium "$CESIUM_KEYS" \
            '{
              image: $image,
              containerPort: 80,
              environment: [
                { name: "ENV", value: "prod" },
                { name: "CESIUM_KEYS", value: $cesium }
              ]
            }')

          aws ecs update-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --primary-container "$CONTAINER_JSON"

      # Express Mode handles canary rollout automatically with built-in rollback.
      # No wait step needed — the update-express-gateway-service call is sufficient.
