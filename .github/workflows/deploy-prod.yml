name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  ECR_REPO: cfm-web
  ECS_CLUSTER: default
  ECS_SERVICE: cfm-web-prod

jobs:
  deploy:
    if: ${{ inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-cfm-prod

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:prod \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:prod

      - name: Update Express Mode service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SERVICE_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].serviceArn' \
            --output text)
          echo "SERVICE_ARN=$SERVICE_ARN" >> $GITHUB_ENV

          aws ecs update-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --primary-container "{\"image\":\"$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG\"}"

      - name: Monitor Express Mode deployment
        run: |
          aws ecs monitor-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --resource-view DEPLOYMENT \
            --mode TEXT-ONLY \
            --timeout 30
