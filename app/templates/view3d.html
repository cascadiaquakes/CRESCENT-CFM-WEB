    <!-- Load repository_config.js synchronously 
             Synchronous XHR ensures loading order: The browser halts execution until repository_config.js is fetched and executed, 
            ensuring that all variables are available. If repository_config.js fails to load, a console error message will help diagnose issues.
            xhrs block the browser’s rendering and prevent the user from interacting with the page until the request completes. However, this
            pause shoud be brief.-->
    <script>
        console.log("Starting the script ");// + Cesium.Ion.defaultAccessToken)
        // Dynamically create and load the configuration script synchronously before loading other scripts
        let branch = "{{ branch }}";
        let configFilePath = `/static/config/${branch === "main" ? "" : branch + "/"}repository_config.js`;

        if (branch !== "main") {
            alert("[WARN] Loading configuration from the branch: [" + branch + "]\n" + configFilePath);
        }

        // Load repository_config.js synchronously to ensure its variables are available before other scripts run
        let xhr = new XMLHttpRequest();
        xhr.open('GET', configFilePath, false); // `false` makes the request synchronous
        xhr.onload = function () {
            if (xhr.status === 200) {
                let script = document.createElement('script');
                script.text = xhr.responseText;
                document.head.appendChild(script);

                // Function to capitalize the branch name
                function capitalizeBranchName(branch) {
                    return branch.charAt(0).toUpperCase() + branch.slice(1);
                }
                // Dynamically update the page title if the branch is not "main"
                if (branch !== "main") {
                    let currentTitle = document.title;
                    let domain = window.location.hostname;
                    let capitalizedBranch = capitalizeBranchName(branch);
                    document.title = `[${capitalizedBranch} - ${domain}] ${currentTitle}`;
                    //alert("Page title updated to: " + document.title);

                }
            } else {
                console.error("Failed to load repository_config.js");
            }
        };
        xhr.send(null);
    </script>

    <script>

        // Opacity for the items outside the study area.
        const outsideOpacity = 0.15

        const cfmAreaFillOpacity = [0.1]

        // Handling the 2D Geojson data.
        document.addEventListener('DOMContentLoaded', function () {
            // Call loadDropdown when the page has finished loading
            loadDropdown();

            // Load the logo after the HTML is loaded.
            // Select the image element by its ID
            const logoImage = document.getElementById('logo-image');

            // Set the src attribute to the desired image URL
            logoImage.src = logoFile;


            function handleGeoJsonData(checkboxId, dataArray, labelArray, colorArray, lineWidthArray, fillOpacityArray, dataSourcesArray, applyBoundingBoxFilter, extraLogic) {
                var checkbox = document.getElementById(checkboxId);
                // ↓↓↓ DEBUG: log the cfmData that this function receives
                console.log('[CFM] handleGeoJsonData received dataArray:', dataArray);
                function handleData(checked) {
                    if (checked) {
                        for (var i = 0; i < dataArray.length; i++) {
                            (function (index) {
                                Cesium.GeoJsonDataSource.load(dataArray[index], {
                                    label: labelArray[index],
                                    stroke: colorArray[index],
                                    fill: colorArray[index].withAlpha(fillOpacityArray[index]),
                                    strokeWidth: lineWidthArray[index],
                                    markerSymbol: '?'
                                }).then(function (dataSource) {
                                    if (applyBoundingBoxFilter) {
                                        const now = Cesium.JulianDate.now();
                                        const isInside = (pos) => {
                                            const cart = Cesium.Cartographic.fromCartesian(pos);
                                            const lon = Cesium.Math.toDegrees(cart.longitude);
                                            const lat = Cesium.Math.toDegrees(cart.latitude);
                                            return lon >= west && lon <= east && lat >= south && lat <= north;
                                        };
                                        const entities = dataSource.entities.values;
                                        entities.forEach((entity) => {
                                            let positions = [];
                                            if (Cesium.defined(entity.polygon)) {
                                                const h = entity.polygon.hierarchy.getValue(now);
                                                if (h) positions = h.positions || h;
                                            } else if (Cesium.defined(entity.polyline)) {
                                                positions = entity.polyline.positions.getValue(now);
                                            }
                                            if (positions.length && positions.every((p) => !isInside(p))) {
                                                if (entity.polygon) {
                                                    entity.polygon.material = colorArray[index].withAlpha(0.0);
                                                    entity.polygon.outlineColor = colorArray[index].withAlpha(outsideOpacity);
                                                }
                                                if (entity.polyline) {
                                                    entity.polyline.material = new Cesium.PolylineGlowMaterialProperty({
                                                        glowPower: 0,
                                                        color: colorArray[index].withAlpha(outsideOpacity)
                                                    });
                                                }
                                            }
                                        });
                                    }

                                    if (extraLogic) {
                                        extraLogic(dataSource, index);
                                    }

                                    dataSourcesArray.push(dataSource);
                                    viewer.dataSources.add(dataSource);
                                }).catch(function (error) {
                                    console.error('Error loading GeoJSON:', error);
                                });
                            })(i);
                        }
                    } else {
                        for (var i = 0; i < dataSourcesArray.length; i++) {
                            if (viewer.dataSources.contains(dataSourcesArray[i])) {
                                viewer.dataSources.remove(dataSourcesArray[i]);
                            }
                        }
                        dataSourcesArray.length = 0; // Clear the array
                    }
                }

                checkbox.addEventListener('change', function () {
                    handleData(this.checked);
                });

                handleData(checkbox.checked);
            }
            // Function to populate the dropdown menu dynamically using auxLabel array
            function populateDropdown() {
                const dropdown = document.getElementById('select2dSurface');

                // Clear existing options (if any)
                dropdown.innerHTML = '';

                // Add options from auxLabel array
                auxLabel.forEach((label, index) => {
                    const option = document.createElement('option');
                    option.value = index;  // Set value as the index in the array
                    option.textContent = label;  // Set the display text from the array
                    dropdown.appendChild(option);
                });
            }

            // Function to enforce a maximum of 2 selections
            function enforceSelectionLimit() {
                const dropdown = document.getElementById('select2dSurface');
                const selectedOptions = Array.from(dropdown.selectedOptions);

                // Enforce selection limit of 2
                if (selectedOptions.length > 2) {
                    // Deselect the latest selected option
                    selectedOptions[selectedOptions.length - 1].selected = false;
                    alert('You can only select a maximum of 2 options.');
                }
            }

            // Function to update the legend
            function updateLegend() {
                const dropdown = document.getElementById('select2dSurface');
                const selectedOptions = Array.from(dropdown.selectedOptions);
                const legend = document.getElementById('legend');

                // Clear the current legend
                legend.innerHTML = '';
                // Loop over selected options and add to legend
                selectedOptions.forEach(option => {
                    const selectedValue = option.value;
                    const color = auxColor[selectedValue];  // Get the color for the selected option

                    // Create a new legend item
                    const legendItem = document.createElement('div');
                    legendItem.style.display = 'flex';
                    legendItem.style.alignItems = 'center';
                    legendItem.style.marginBottom = '5px';

                    // Create a colored box for the legend
                    const colorBox = document.createElement('div');
                    colorBox.style.width = '20px';
                    colorBox.style.height = '20px';
                    colorBox.style.backgroundColor = color.toCssColorString();  // Assuming auxColor is a Cesium Color object
                    colorBox.style.marginRight = '10px';

                    // Create a label for the legend item
                    const label = document.createElement('span');
                    label.textContent = auxLabel[selectedValue];  // Label from the auxLabel array

                    // Add the color box and label to the legend item
                    legendItem.appendChild(colorBox);
                    legendItem.appendChild(label);

                    // Add the legend item to the legend div
                    legend.appendChild(legendItem);
                });
            }

            // Function to handle the dropdown change event
            var auxDataSources = [];

            function handleDropdownChange() {
                const dropdown = document.getElementById('select2dSurface');
                const checkbox = document.getElementById('toggle2dSurfaceCheckbox');

                // Get selected options
                const selectedOptions = Array.from(dropdown.selectedOptions);
                // Check if there are any selections
                if (selectedOptions.length > 0) {
                    checkbox.checked = true;
                } else {
                    checkbox.checked = false;
                }

                // Clear items from the last selection, if any

                for (var i = 0; i < auxDataSources.length; i++) {

                    if (viewer.dataSources.contains(auxDataSources[i])) {
                        viewer.dataSources.remove(auxDataSources[i]);
                    }
                }
                auxDataSources.length = 0; // Clear the array

                // Loop over selected options and handle each selection
                selectedOptions.forEach(option => {
                    const selectedValue = option.value;
                    handleGeoJsonData(
                        'toggle2dSurfaceCheckbox',
                        [auxData[selectedValue]],
                        [auxLabel[selectedValue]],
                        [auxColor[selectedValue]],
                        [auxLineWidth[selectedValue]],
                        [auxFillOpacity[selectedValue]],
                        auxDataSources,
                        false
                    );
                });

                // Update the legend whenever the selection changes
                updateLegend();
            }

            // Call the populateDropdown function to add the options from auxLabel array
            populateDropdown();

            // Add event listener to the dropdown
            document.getElementById('select2dSurface').addEventListener('change', function () {
                enforceSelectionLimit();
                handleDropdownChange();
            });
            // Add event listener to the dropdown
            // document.getElementById('toggle2dSurfaceCheckbox').addEventListener('change', function () {

            //});
            document.getElementById('toggle2dSurfaceCheckbox').addEventListener('change', function () {
                const checkbox = this;

                if (checkbox.checked) {
                    // Handle current dropdown selections when checked
                    handleDropdownChange();
                } else {
                    // Clear previous data sources when unchecked
                    for (var i = 0; i < auxDataSources.length; i++) {
                        if (viewer.dataSources.contains(auxDataSources[i])) {
                            viewer.dataSources.remove(auxDataSources[i]);
                        }
                    }
                    auxDataSources.length = 0; // Clear the array

                    // Optionally clear the selected options in the dropdown
                    const dropdown = document.getElementById('select2dSurface');
                    dropdown.selectedIndex = -1; // Deselect all options

                    // Clear the legend
                    const legend = document.getElementById('legend');
                    legend.innerHTML = '';
                }
            });

            const dropdown = document.getElementById('select2dSurface');
            dropdown.options[0].selected = true;
            const checkbox = document.getElementById('toggle2dSurfaceCheckbox');
            checkbox.checked = true;
            enforceSelectionLimit();
            handleDropdownChange();

            // Boundary lines.
            var boundaryDataSources = [];
            handleGeoJsonData('toggleBoundaryCheckbox', boundaryData, boundaryLabel, boundaryColor, boundaryLineWidth, boundaryFillOpacity, boundaryDataSources, true);

            // CFM data with additional logic
            var cfmDataSources = [];
            handleGeoJsonData(
                'toggleCFMCheckbox',
                cfmData,
                cfmLabel,
                cfmColor,
                cfmLineWidth,
                cfmFillOpacity,
                cfmDataSources,
                false,
                function (dataSource, index) {
                    var entitiesToRemove = [];
                    dataSource.entities.values.forEach(function (entity) {
                        var ok = true;
                        // Display all if selectedLines is empty.
                        if (selectedLines.length != 0) {
                            let eid = entity.properties.id ? String(entity.properties.id.getValue ? entity.properties.id.getValue() : entity.properties.id) : '';
                            let cfmId = entity.properties.CFM_ID ? String(entity.properties.CFM_ID.getValue ? entity.properties.CFM_ID.getValue() : entity.properties.CFM_ID) : '';
                            if (!selectedLines.includes(eid) && !selectedLines.includes(cfmId)) {
                                ok = false;
                                entitiesToRemove.push(entity);
                            }
                        }
                        if (ok) {
                            if (Cesium.defined(entity.polygon)) {
                                var coordinates = entity.polygon.hierarchy.getValue().positions;
                                coordinates.forEach(function (coordinate) {
                                    Cesium.Cartographic.fromCartesian(coordinate);
                                });
                            } else if (Cesium.defined(entity.polyline)) {
                                var positions = entity.polyline.positions.getValue();
                                positions.forEach(function (position) {
                                    Cesium.Cartographic.fromCartesian(position);
                                });
                            }
                            var description = '';
                            var properties = entity.properties;
                            for (var propertyName in properties) {
                                if (properties.hasOwnProperty(propertyName) && typeof properties[propertyName] !== 'function') {
                                    var propNameWithoutUnderscore = propertyName.replace(/^_/, '');
                                    description += propNameWithoutUnderscore + ': ' + properties[propertyName] + '<br />';
                                }
                            }
                            entity.description = description;
                        }
                    });

                    entitiesToRemove.forEach(function (entity) {
                        dataSource.entities.remove(entity);
                    });
                }
            );

            // CFM Trace data with additional logic
            var cfmTraceDataSources = [];
            handleGeoJsonData(
                'toggleCFMTraceCheckbox',
                cfmTraceData,
                cfmTraceLabel,
                cfmTraceColor,
                cfmTraceLineWidth,
                cfmTraceFillOpacity,
                cfmTraceDataSources,
                false,
                function (dataSource, index) {
                    var entitiesToRemove = [];
                    dataSource.entities.values.forEach(function (entity) {
                        var ok = true;
                        // Display all if selectedLines is empty.
                        if (selectedLines.length != 0) {
                            let eid = entity.properties.id ? String(entity.properties.id.getValue ? entity.properties.id.getValue() : entity.properties.id) : '';
                            let cfmId = entity.properties.CFM_ID ? String(entity.properties.CFM_ID.getValue ? entity.properties.CFM_ID.getValue() : entity.properties.CFM_ID) : '';
                            if (!selectedLines.includes(eid) && !selectedLines.includes(cfmId)) {
                                ok = false;
                                entitiesToRemove.push(entity);
                            }
                        }
                        if (ok) {
                            if (Cesium.defined(entity.polygon)) {
                                var coordinates = entity.polygon.hierarchy.getValue().positions;
                                coordinates.forEach(function (coordinate) {
                                    Cesium.Cartographic.fromCartesian(coordinate);
                                });
                            } else if (Cesium.defined(entity.polyline)) {
                                var positions = entity.polyline.positions.getValue();
                                positions.forEach(function (position) {
                                    Cesium.Cartographic.fromCartesian(position);
                                });
                            }
                            var description = '';
                            var properties = entity.properties;
                            for (var propertyName in properties) {
                                if (properties.hasOwnProperty(propertyName) && typeof properties[propertyName] !== 'function') {
                                    var propNameWithoutUnderscore = propertyName.replace(/^_/, '');
                                    description += propNameWithoutUnderscore + ': ' + properties[propertyName] + '<br />';
                                }
                            }
                            entity.description = description;
                        }
                    });

                    entitiesToRemove.forEach(function (entity) {
                        dataSource.entities.remove(entity);
                    });
                }
            );
        });



        console.log("Setting the viewer ");// + Cesium.Ion.defaultAccessToken)
        var viewer = new Cesium.Viewer('cesiumContainer', {
            depthPlaneEllipsoidOffset: 10000,
            nearToFarRatio: 1e6,
            farToNearRatio: 1e-6,
            sceneMode: Cesium.SceneMode.SCENE3D,
            scene3DOnly: true,
            skyBox: false, // Disable default skybox
            skyAtmosphere: false, // Disable sky atmosphere
            enableCollisionDetection: false,
            navigationInstructionsInitiallyVisible: true,
            baseLayer: Cesium.ImageryLayer.fromProviderAsync(Cesium.IonImageryProvider.fromAssetId(3954)),
            globe: new Cesium.Globe(Cesium.Ellipsoid.WGS84, {
                minimumZoomDistance: 0.0
            })
        });

        // Set background color to black
        viewer.scene.backgroundColor = Cesium.Color.BLACK;

        // Allow the infoBox iframe to run scripts so the Load High-Res button can call parent
        viewer.infoBox.frame.setAttribute('sandbox',
            'allow-same-origin allow-scripts allow-popups allow-forms');
        viewer.infoBox.frame.src = 'about:blank';

        // The north arrow.
        function updateNorthArrow() {
            var heading = Cesium.Math.toDegrees(viewer.camera.heading);
            document.getElementById('northArrow').style.transform = 'rotate(' + (-heading) + 'deg)';
        }
        // Ensure update on initial load
        updateNorthArrow();

        // Bind updateNorthArrow to the postRender event
        viewer.scene.postRender.addEventListener(updateNorthArrow);

        // ---- High-res button in the infoBox popup ----
        // Expose a global so the button inside the infoBox iframe can call back out
        window.loadHighResFromPopup = async function (faultId) {
            faultId = String(faultId);
            const statusDiv = document.getElementById('highResStatus');

            // If already loaded, do nothing
            if (loadedHighResFaults[faultId]) {
                statusDiv.innerText = 'Already loaded.';
                statusDiv.style.color = '#64748b';
                return;
            }

            statusDiv.innerText = 'Loading high-res...';
            statusDiv.style.color = '#0b4a53';

            // Hide low-res entities for this fault
            let ds = findCfmSurfacesDS();
            if (ds) {
                ds.entities.values.forEach(entity => {
                    if (entity.properties && entity.properties.CFM_ID) {
                        let eId = String(typeof entity.properties.CFM_ID.getValue === 'function'
                            ? entity.properties.CFM_ID.getValue() : entity.properties.CFM_ID);
                        if (eId === faultId) {
                            entity.show = false;
                            if (!hiddenLowResEntities[faultId]) hiddenLowResEntities[faultId] = [];
                            hiddenLowResEntities[faultId].push(entity);
                        }
                    }
                });
            }

            try {
                let hiresUrl = githubBaseUrl + 'hires_faults/' + faultId + '_hires.geojson';
                let dataSource = await Cesium.GeoJsonDataSource.load(hiresUrl, {
                    stroke: Cesium.Color.CYAN,
                    fill: Cesium.Color.CYAN.withAlpha(0.5),
                    strokeWidth: 3
                });
                viewer.dataSources.add(dataSource);
                loadedHighResFaults[faultId] = dataSource;
                statusDiv.innerText = 'High-res faults loaded!';
                statusDiv.style.color = '#0b4a53';
            } catch (err) {
                statusDiv.innerText = 'Failed to load high-res.';
                statusDiv.style.color = '#dc2626';
                console.error('High-res load error:', err);
            }
        };

        // Append a Load High-Res button to the infoBox description whenever a CFM surface is selected
        viewer.selectedEntityChanged.addEventListener(function (entity) {
            if (!entity || !entity.properties) return;
            let cfmId = entity.properties.CFM_ID;
            if (!cfmId) return;
            let id = String(typeof cfmId.getValue === 'function' ? cfmId.getValue() : cfmId);
            if (!id) return;

        // Outline box for CVM.
        function updateBoxOutline(minLat, maxLat, minLon, maxLon, minDepth, maxDepth, alpha) {
            const minDepthScaled = minDepth * -1000;
            const maxDepthScaled = maxDepth * -1000;

            const topPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
                minLon, minLat, minDepthScaled,
                maxLon, minLat, minDepthScaled,
                maxLon, maxLat, minDepthScaled,
                minLon, maxLat, minDepthScaled
            ]);

            const bottomPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
                minLon, minLat, maxDepthScaled,
                maxLon, minLat, maxDepthScaled,
                maxLon, maxLat, maxDepthScaled,
                minLon, maxLat, maxDepthScaled
            ]);

            const northPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
                minLon, maxLat, minDepthScaled,
                maxLon, maxLat, minDepthScaled,
                maxLon, maxLat, maxDepthScaled,
                minLon, maxLat, maxDepthScaled
            ]);

            const southPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
                minLon, minLat, minDepthScaled,
                maxLon, minLat, minDepthScaled,
                maxLon, minLat, maxDepthScaled,
                minLon, minLat, maxDepthScaled
            ]);

            const eastPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
                maxLon, minLat, minDepthScaled,
                maxLon, maxLat, minDepthScaled,
                maxLon, maxLat, maxDepthScaled,
                maxLon, minLat, maxDepthScaled
            ]);

            const westPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
                minLon, minLat, minDepthScaled,
                minLon, maxLat, minDepthScaled,
                minLon, maxLat, maxDepthScaled,
                minLon, minLat, maxDepthScaled
            ]);

            // Helper function to create and add polygon entity
            function addPolygonEntity(positions, alpha, name) {
                // Add a polyline entity for a thicker outline with transparency
                const line = viewer.entities.add({ name: name + " outline", polyline: { positions, width: cvmLineWidth[0], material: cvmOutlineColor.withAlpha(1.0) } });
                const poly = viewer.entities.add({ name: name, polygon: { hierarchy: new Cesium.PolygonHierarchy(positions), material: cvmFaceColor.withAlpha(alpha), perPositionHeight: true, outline: true, outlineColor: cvmOutlineColor } });
                return [poly, line];

            }

            // Remove existing entities if they exist
            if (boxEntities) {
                boxEntities.forEach(entity => viewer.entities.remove(entity));
            }
            boxEntities = [];

            // Add polygons for all six faces
            boxEntities.push(...addPolygonEntity(topPositions, alpha, 'Top Surface'));
            boxEntities.push(...addPolygonEntity(bottomPositions, alpha, 'Bottom Surface'));
            boxEntities.push(...addPolygonEntity(northPositions, alpha, 'North Surface'));
            boxEntities.push(...addPolygonEntity(southPositions, alpha, 'South Surface'));
            boxEntities.push(...addPolygonEntity(eastPositions, alpha, 'East Surface'));
            boxEntities.push(...addPolygonEntity(westPositions, alpha, 'West Surface'));
        }

// Hoisted so loadHighResFromPopup (defined above) can access these
const githubBaseUrl = "https://raw.githubusercontent.com/cascadiaquakes/CRESCENT-CFM/dev/crescent_cfm_files/";
const loadedHighResFaults = {};
const hiddenLowResEntities = {};

// Find the CFM surfaces datasource (the one with 1000+ CFM_ID entities)
let cfmSurfacesDS = null;
function findCfmSurfacesDS() {
    if (cfmSurfacesDS) return cfmSurfacesDS;
    for (let i = 0; i < viewer.dataSources.length; i++) {
        let ds = viewer.dataSources.get(i);
        if (ds.entities.values.length > 1000) {
            let props = ds.entities.values[0]?.properties?._propertyNames || [];
            if (props.includes('CFM_ID')) {
                cfmSurfacesDS = ds;
                return ds;
            }
        }
    }
    return null;
}

setTimeout(() => {
    const listUrl = githubBaseUrl + "crescent_cfm_crustal_3d_lowres.geojson";

    // findCfmSurfacesDS is hoisted above setTimeout so loadHighResFromPopup can use it

    fetch(listUrl)
        .then(response => response.json())
        .then(data => {
            const selectBox = document.getElementById('selectHighResFaults');
            const features = data.features.sort((a, b) => {
                let nameA = a.properties.name || '';
                let nameB = b.properties.name || '';
                return nameA.localeCompare(nameB);
            });
            features.forEach(feat => {
                let id = feat.properties.id || feat.properties.CFM_ID;
                let name = feat.properties.name || 'Fault ' + id;
                if(id) {
                    let option = document.createElement('option');
                    option.value = id;
                    option.text = name + ' (ID: ' + id + ')';
                    selectBox.appendChild(option);
                }
            });
        })
        .catch(err => console.error("Error loading fault list:", err));

    document.getElementById('loadHighResBtn').addEventListener('click', async () => {
        const selectBox = document.getElementById('selectHighResFaults');
        const statusDiv = document.getElementById('highResStatus');
        const selectedOptions = Array.from(selectBox.selectedOptions);
        if (selectedOptions.length === 0) {
            statusDiv.innerText = "Please select at least one fault.";
            statusDiv.style.color = "#dc2626";
            return;
        }
        if (selectedOptions.length > 10) {
            statusDiv.innerText = "Max 10 faults. You selected " + selectedOptions.length + ".";
            statusDiv.style.color = "#dc2626";
            return;
        }

        // Clear previous high-res and restore previous low-res
        for (let faultId in loadedHighResFaults) {
            let ds = loadedHighResFaults[faultId];
            if (viewer.dataSources.contains(ds)) viewer.dataSources.remove(ds);
        }
        for (let faultId in hiddenLowResEntities) {
            hiddenLowResEntities[faultId].forEach(e => { e.show = true; });
        }
        for (let key in loadedHighResFaults) delete loadedHighResFaults[key];
        for (let key in hiddenLowResEntities) delete hiddenLowResEntities[key];

        statusDiv.innerText = 'Loading ' + selectedOptions.length + ' high-res fault(s)...';
        statusDiv.style.color = "#0b4a53";

        let ds = findCfmSurfacesDS();

        for (let option of selectedOptions) {
            let faultId = String(option.value);
            let hiresUrl = githubBaseUrl + 'hires_faults/' + faultId + '_hires.geojson';
            try {
                // Hide low-res triangles for this fault
                if (ds) {
                    ds.entities.values.forEach(entity => {
                        if (entity.properties && entity.properties.CFM_ID) {
                            let eId = String(typeof entity.properties.CFM_ID.getValue === 'function' ? entity.properties.CFM_ID.getValue() : entity.properties.CFM_ID);
                            if (eId === faultId) {
                                entity.show = false;
                                if (!hiddenLowResEntities[faultId]) hiddenLowResEntities[faultId] = [];
                                hiddenLowResEntities[faultId].push(entity);
                            }
                        }
                    });
                }
                // Load high-res
                let dataSource = await Cesium.GeoJsonDataSource.load(hiresUrl, {
                    stroke: Cesium.Color.CYAN,
                    fill: Cesium.Color.CYAN.withAlpha(0.5),
                    strokeWidth: 3
                });
                viewer.dataSources.add(dataSource);
                loadedHighResFaults[faultId] = dataSource;
            } catch (err) {
                console.error('Failed to load high-res fault ' + faultId + ':', err);
            }
        }
        statusDiv.innerText = "High-res faults loaded!";
        statusDiv.style.color = "#0b4a53";
    });

    document.getElementById('resetHighResBtn').addEventListener('click', () => {
        const statusDiv = document.getElementById('highResStatus');
        for (let faultId in loadedHighResFaults) {
            let ds = loadedHighResFaults[faultId];
            if (viewer.dataSources.contains(ds)) viewer.dataSources.remove(ds);
        }
        for (let faultId in hiddenLowResEntities) {
            hiddenLowResEntities[faultId].forEach(e => { e.show = true; });
        }
        for (let key in loadedHighResFaults) delete loadedHighResFaults[key];
        for (let key in hiddenLowResEntities) delete hiddenLowResEntities[key];
        document.getElementById('selectHighResFaults').selectedIndex = -1;
        statusDiv.innerText = "Reset complete. Showing low-res.";
        statusDiv.style.color = "#64748b";
    });
}, 2000);

    // Add title tooltips to truncated select options so full name shows on hover
    ['selectHighResFaults', 'select2dSurface'].forEach(function(id) {
        var sel = document.getElementById(id);
        if (!sel) return;
        new MutationObserver(function() {
            Array.from(sel.options).forEach(function(o) { o.title = o.text; });
        }).observe(sel, { childList: true });
        Array.from(sel.options).forEach(function(o) { o.title = o.text; });
    });

    // Prevent panel scroll from bleeding into Cesium
    var wrapper = document.getElementById('cardWrapper');
    if (wrapper) wrapper.addEventListener('wheel', function(e) { e.stopPropagation(); }, { passive: false });

    // Legend toggle button
    (function() {
        const legend = document.getElementById('legendContainer');
        const toggleBtn = document.getElementById('toggle-legend');
        if (!legend || !toggleBtn) return;
        toggleBtn.addEventListener('click', function() {
            if (legend.classList.contains('is-open')) {
                legend.classList.remove('is-open');
                legend.classList.add('is-closed');
                toggleBtn.classList.add('is-active');
            } else {
                legend.classList.remove('is-closed');
                legend.classList.add('is-open');
                toggleBtn.classList.remove('is-active');
            }
        });
    })();

    </script>
</body>

</html>
