    <!-- Load repository_config.js synchronously 
             Synchronous XHR ensures loading order: The browser halts execution until repository_config.js is fetched and executed, 
            ensuring that all variables are available. If repository_config.js fails to load, a console error message will help diagnose issues.
            xhrs block the browser’s rendering and prevent the user from interacting with the page until the request completes. However, this
            pause shoud be brief.-->
    <script>
      console.log("Starting the script "); // + Cesium.Ion.defaultAccessToken)
      // Dynamically create and load the configuration script synchronously before loading other scripts
      let branch = "{{ branch }}";
      let configFilePath = `/static/config/${branch === "main" ? "" : branch + "/"}repository_config.js`;

      if (branch !== "main") {
        alert(
          "[WARN] Loading configuration from the branch: [" +
            branch +
            "]\n" +
            configFilePath,
        );
      }

      // Load repository_config.js synchronously to ensure its variables are available before other scripts run
      let xhr = new XMLHttpRequest();
      xhr.open("GET", configFilePath, false); // `false` makes the request synchronous
      xhr.onload = function () {
        if (xhr.status === 200) {
          let script = document.createElement("script");
          script.text = xhr.responseText;
          document.head.appendChild(script);

          // Function to capitalize the branch name
          function capitalizeBranchName(branch) {
            return branch.charAt(0).toUpperCase() + branch.slice(1);
          }
          // Dynamically update the page title if the branch is not "main"
          if (branch !== "main") {
            let currentTitle = document.title;
            let domain = window.location.hostname;
            let capitalizedBranch = capitalizeBranchName(branch);
            document.title = `[${capitalizedBranch} - ${domain}] ${currentTitle}`;
            //alert("Page title updated to: " + document.title);
          }
        } else {
          console.error("Failed to load repository_config.js");
        }
      };
      xhr.send(null);
    </script>

    <script>
      // Opacity for the items outside the study area.
      const outsideOpacity = 0.15;

      let earthquakeDataSource;

      // CFM area display parameters.
      const cfmAreaOutlineColor = [Cesium.Color.CYAN];
      const cfmAreaFaceColor = [Cesium.Color.CYAN];
      const cfmAreaLabel = ["CFM Study Area"];
      const cfmAreaFillOpacity = [0.1];

      // Handling the 2D Geojson data.
      document.addEventListener("DOMContentLoaded", function () {
        // Call loadDropdown when the page has finished loading
        loadDropdown();

        // Load the logo after the HTML is loaded.
        // Select the image element by its ID
        const logoImage = document.getElementById("logo-image");

        // Set the src attribute to the desired image URL
        logoImage.src = logoFile;

        const eqLegendEl = document.getElementById("eqLegendLabel");
        if (eqLegendEl) {
          if (Array.isArray(eqLabel)) {
            eqLegendEl.textContent = eqLabel[0];
          } else {
            eqLegendEl.textContent = eqLabel;
          }
        }

        function handleGeoJsonData(
          checkboxId,
          dataArray,
          labelArray,
          colorArray,
          lineWidthArray,
          fillOpacityArray,
          dataSourcesArray,
          applyBoundingBoxFilter,
          extraLogic,
        ) {
          var checkbox = document.getElementById(checkboxId);

          // ↓↓↓ DEBUG: log the cfmData that this function receives
          console.log("[CFM] handleGeoJsonData received dataArray:", dataArray);
          function handleData(checked) {
            if (checked) {
              for (var i = 0; i < dataArray.length; i++) {
                (function (index) {
                  fetch(dataArray[index])
                    .then(function (response) {
                      return response.json();
                    })
                    .then(function (geojson) {
                      if (geojson.crs) {
                        const crsName =
                          (geojson.crs.properties &&
                            geojson.crs.properties.name) ||
                          "";
                        const wgs84Names = [
                          "epsg:4326",
                          "epsg:4979",
                          "urn:ogc:def:crs:ogc:1.3:crs84",
                          "urn:ogc:def:crs:ogc::crs84",
                          "urn:ogc:def:crs:epsg::4326",
                          "urn:ogc:def:crs:epsg::4979",
                        ];
                        if (!wgs84Names.includes(crsName.toLowerCase())) {
                          throw new Error(
                            'Unsupported CRS "' +
                              crsName +
                              '" in ' +
                              dataArray[index] +
                              ". Only WGS84 (EPSG:4326 / EPSG:4979) is supported.",
                          );
                        }
                        delete geojson.crs;
                      }
                      return Cesium.GeoJsonDataSource.load(geojson, {
                        label: labelArray[index],
                        stroke: colorArray[index],
                        fill: colorArray[index].withAlpha(
                          fillOpacityArray[index],
                        ),
                        strokeWidth: lineWidthArray[index],
                        markerSymbol: "?",
                      });
                    })
                    .then(function (dataSource) {
                      if (applyBoundingBoxFilter) {
                        const now = Cesium.JulianDate.now();
                        const isInside = pos => {
                          const cart = Cesium.Cartographic.fromCartesian(pos);
                          const lon = Cesium.Math.toDegrees(cart.longitude);
                          const lat = Cesium.Math.toDegrees(cart.latitude);
                          return (
                            lon >= west &&
                            lon <= east &&
                            lat >= south &&
                            lat <= north
                          );
                        };
                        const entities = dataSource.entities.values;
                        entities.forEach(entity => {
                          let positions = [];
                          if (Cesium.defined(entity.polygon)) {
                            const h = entity.polygon.hierarchy.getValue(now);
                            if (h) positions = h.positions || h;
                          } else if (Cesium.defined(entity.polyline)) {
                            positions = entity.polyline.positions.getValue(now);
                          }
                          if (
                            positions.length &&
                            positions.every(p => !isInside(p))
                          ) {
                            if (entity.polygon) {
                              entity.polygon.material =
                                colorArray[index].withAlpha(0.0);
                              entity.polygon.outlineColor =
                                colorArray[index].withAlpha(outsideOpacity);
                            }
                            if (entity.polyline) {
                              entity.polyline.material =
                                new Cesium.PolylineGlowMaterialProperty({
                                  glowPower: 0,
                                  color:
                                    colorArray[index].withAlpha(outsideOpacity),
                                });
                            }
                          }
                        });
                      }

                      if (extraLogic) {
                        extraLogic(dataSource, index);
                      }

                      dataSourcesArray.push(dataSource);
                      viewer.dataSources.add(dataSource);
                    })
                    .catch(function (error) {
                      console.error("Error loading GeoJSON:", error);
                    });
                })(i);
              }
            } else {
              for (var i = 0; i < dataSourcesArray.length; i++) {
                if (viewer.dataSources.contains(dataSourcesArray[i])) {
                  viewer.dataSources.remove(dataSourcesArray[i]);
                }
              }
              dataSourcesArray.length = 0; // Clear the array
            }
          }

          checkbox.addEventListener("change", function () {
            handleData(this.checked);
          });

          handleData(checkbox.checked);
        }
        // Function to populate the dropdown menu dynamically using auxLabel array
        function populateDropdown() {
          const dropdown = document.getElementById("select2dSurface");

          // Clear existing options (if any)
          dropdown.innerHTML = "";

          // Add options from auxLabel array
          auxLabel.forEach((label, index) => {
            const option = document.createElement("option");
            option.value = index; // Set value as the index in the array
            option.textContent = label; // Set the display text from the array
            dropdown.appendChild(option);
          });
        }

        // Function to enforce a maximum of 2 selections
        function enforceSelectionLimit() {
          const dropdown = document.getElementById("select2dSurface");
          const selectedOptions = Array.from(dropdown.selectedOptions);

          // Enforce selection limit of 2
          if (selectedOptions.length > 2) {
            // Deselect the latest selected option
            selectedOptions[selectedOptions.length - 1].selected = false;
            alert("You can only select a maximum of 2 options.");
          }
        }

        // Function to update the legend
        function updateLegend() {
          const dropdown = document.getElementById("select2dSurface");
          const selectedOptions = Array.from(dropdown.selectedOptions);
          const legend = document.getElementById("legend");

          // Clear the current legend
          legend.innerHTML = "";
          // Loop over selected options and add to legend
          selectedOptions.forEach(option => {
            const selectedValue = option.value;
            const color = auxColor[selectedValue]; // Get the color for the selected option

            // Create a new legend item
            const legendItem = document.createElement("div");
            legendItem.style.display = "flex";
            legendItem.style.alignItems = "center";
            legendItem.style.marginBottom = "5px";

            // Create a colored box for the legend
            const colorBox = document.createElement("div");
            colorBox.style.width = "20px";
            colorBox.style.height = "20px";
            colorBox.style.backgroundColor = color.toCssColorString(); // Assuming auxColor is a Cesium Color object
            colorBox.style.marginRight = "10px";

            // Create a label for the legend item
            const label = document.createElement("span");
            label.textContent = auxLabel[selectedValue]; // Label from the auxLabel array

            // Add the color box and label to the legend item
            legendItem.appendChild(colorBox);
            legendItem.appendChild(label);

            // Add the legend item to the legend div
            legend.appendChild(legendItem);
          });
        }

        // Function to handle the dropdown change event
        var auxDataSources = [];

        function handleDropdownChange() {
          const dropdown = document.getElementById("select2dSurface");
          const checkbox = document.getElementById("toggle2dSurfaceCheckbox");

          // Get selected options
          const selectedOptions = Array.from(dropdown.selectedOptions);
          // Check if there are any selections
          if (selectedOptions.length > 0) {
            checkbox.checked = true;
          } else {
            checkbox.checked = false;
          }

          // Clear items from the last selection, if any

          for (var i = 0; i < auxDataSources.length; i++) {
            if (viewer.dataSources.contains(auxDataSources[i])) {
              viewer.dataSources.remove(auxDataSources[i]);
            }
          }
          auxDataSources.length = 0; // Clear the array

          // Loop over selected options and handle each selection
          selectedOptions.forEach(option => {
            const selectedValue = option.value;
            handleGeoJsonData(
              "toggle2dSurfaceCheckbox",
              [auxData[selectedValue]],
              [auxLabel[selectedValue]],
              [auxColor[selectedValue]],
              [auxLineWidth[selectedValue]],
              [auxFillOpacity[selectedValue]],
              auxDataSources,
              false,
            );
          });

          // Update the legend whenever the selection changes
          updateLegend();
        }

        // Call the populateDropdown function to add the options from auxLabel array
        populateDropdown();

        // Add event listener to the dropdown
        document
          .getElementById("select2dSurface")
          .addEventListener("change", function () {
            enforceSelectionLimit();
            handleDropdownChange();
          });
        // Add event listener to the dropdown
        // document.getElementById('toggle2dSurfaceCheckbox').addEventListener('change', function () {

        //});
        document
          .getElementById("toggle2dSurfaceCheckbox")
          .addEventListener("change", function () {
            const checkbox = this;

            if (checkbox.checked) {
              // Handle current dropdown selections when checked
              handleDropdownChange();
            } else {
              // Clear previous data sources when unchecked
              for (var i = 0; i < auxDataSources.length; i++) {
                if (viewer.dataSources.contains(auxDataSources[i])) {
                  viewer.dataSources.remove(auxDataSources[i]);
                }
              }
              auxDataSources.length = 0; // Clear the array

              // Optionally clear the selected options in the dropdown
              const dropdown = document.getElementById("select2dSurface");
              dropdown.selectedIndex = -1; // Deselect all options

              // Clear the legend
              const legend = document.getElementById("legend");
              legend.innerHTML = "";
            }
          });

        const dropdown = document.getElementById("select2dSurface");
        dropdown.options[0].selected = true;
        const checkbox = document.getElementById("toggle2dSurfaceCheckbox");
        checkbox.checked = true;
        enforceSelectionLimit();
        handleDropdownChange();

        // Boundary lines.
        var boundaryDataSources = [];
        handleGeoJsonData(
          "toggleBoundaryCheckbox",
          boundaryData,
          boundaryLabel,
          boundaryColor,
          boundaryLineWidth,
          boundaryFillOpacity,
          boundaryDataSources,
          true,
        );

        // CFM data with additional logic
        var cfmDataSources = [];
        handleGeoJsonData(
          "toggleCFMCheckbox",
          cfmData,
          cfmLabel,
          cfmColor,
          cfmLineWidth,
          cfmFillOpacity,
          cfmDataSources,
          false,
          function (dataSource, index) {
            const entitiesToRemove = [];

            dataSource.entities.values.forEach(function (entity) {
              const now = Cesium.JulianDate.now();
              let ok = true;

              // ---- robust id extraction (works for Cesium Property objects) ----
              const pidProp = entity?.properties?.CFM_ID;
              const pidVal =
                pidProp && typeof pidProp.getValue === "function"
                  ? pidProp.getValue(now)
                  : pidProp;

              // ---- filter by selectedLines (if any) ----
              if (selectedLines.length !== 0) {
                if (!selectedLines.includes(String(pidVal))) {
                  // 🔎 DEBUG: log a few mismatches (most useful)
                  if (entitiesToRemove.length < 3) {
                    console.log("[CFM-3D] SURFACE mismatch sample:", {
                      entityId: entity.id,
                      propertiesId: pidVal,
                      selectedLines0: selectedLines[0],
                    });
                  }
                  ok = false;
                  entitiesToRemove.push(entity);
                  return; // nothing else to do for this entity
                }
              }

              // ---- keep entity, build name + description ----
              const properties = entity.properties || {};

              // Choose a meaningful name for the infoBox title
              let nameValue = null;
              if (properties.name) {
                nameValue =
                  typeof properties.name.getValue === "function"
                    ? properties.name.getValue(now)
                    : properties.name;
              } else if (properties.id) {
                const idVal =
                  typeof properties.id.getValue === "function"
                    ? properties.id.getValue(now)
                    : properties.id;
                nameValue = `Fault ${idVal}`;
              } else {
                nameValue = "CFM Fault Surface";
              }
              entity.name = nameValue;

              // Keep the existing coordinate / description logic
              if (Cesium.defined(entity.polygon)) {
                const hierarchy = entity.polygon.hierarchy.getValue(now);
                const coords = hierarchy.positions || hierarchy;
                coords.forEach(function (coordinate) {
                  Cesium.Cartographic.fromCartesian(coordinate);
                });
              } else if (Cesium.defined(entity.polyline)) {
                const positions = entity.polyline.positions.getValue(now);
                positions.forEach(function (position) {
                  Cesium.Cartographic.fromCartesian(position);
                });
              }

              // Build a safe description string from properties
              let description = "";
              for (const propertyName in properties) {
                if (
                  Object.prototype.hasOwnProperty.call(
                    properties,
                    propertyName,
                  ) &&
                  typeof properties[propertyName] !== "function"
                ) {
                  const propNameWithoutUnderscore = propertyName.replace(
                    /^_/,
                    "",
                  );
                  const valProp = properties[propertyName];
                  const val =
                    valProp && typeof valProp.getValue === "function"
                      ? valProp.getValue(now)
                      : valProp;

                  description += `${propNameWithoutUnderscore}: ${val}<br />`;
                }
              }

              entity.isFault = true;
              entity.description = description;
            });

            // remove filtered-out entities
            entitiesToRemove.forEach(function (entity) {
              dataSource.entities.remove(entity);
            });

            // Optional: summary debug
            if (selectedLines.length) {
              console.log(
                "[CFM-3D] SURFACES removed:",
                entitiesToRemove.length,
              );
            }
          },
        );

        // CFM Trace data with additional logic
        var cfmTraceDataSources = [];
        handleGeoJsonData(
          "toggleCFMTraceCheckbox",
          cfmTraceData,
          cfmTraceLabel,
          cfmTraceColor,
          cfmTraceLineWidth,
          cfmTraceFillOpacity,
          cfmTraceDataSources,
          false,
          function (dataSource, index) {
            const entitiesToRemove = [];

            dataSource.entities.values.forEach(function (entity) {
              const now = Cesium.JulianDate.now();
              let ok = true;

              // ---- robust id extraction ----
              const pidProp = entity?.properties?.CFM_ID;
              const pidVal =
                pidProp && typeof pidProp.getValue === "function"
                  ? pidProp.getValue(now)
                  : pidProp;

              // ---- filter by selectedLines (if any) ----
              if (selectedLines.length !== 0) {
                if (!selectedLines.includes(String(pidVal))) {
                  // 🔎 DEBUG: log a few mismatches
                  if (entitiesToRemove.length < 3) {
                    console.log("[CFM-3D] TRACE mismatch sample:", {
                      entityId: entity.id,
                      propertiesId: pidVal,
                      selectedLines0: selectedLines[0],
                    });
                  }
                  ok = false;
                  entitiesToRemove.push(entity);
                  return;
                }
              }

              // ---- keep entity, build description ----
              const properties = entity.properties || {};

              // (Optional) give traces a better title too
              if (properties.name) {
                entity.name =
                  typeof properties.name.getValue === "function"
                    ? properties.name.getValue(now)
                    : properties.name;
              } else if (properties.id) {
                const idVal =
                  typeof properties.id.getValue === "function"
                    ? properties.id.getValue(now)
                    : properties.id;
                entity.name = `Fault ${idVal} (trace)`;
              } else {
                entity.name = "CFM Fault Trace";
              }

              if (Cesium.defined(entity.polygon)) {
                const h = entity.polygon.hierarchy.getValue(now);
                const coords = h.positions || h;
                coords.forEach(function (coordinate) {
                  Cesium.Cartographic.fromCartesian(coordinate);
                });
              } else if (Cesium.defined(entity.polyline)) {
                const positions = entity.polyline.positions.getValue(now);
                positions.forEach(function (position) {
                  Cesium.Cartographic.fromCartesian(position);
                });
              }

              // ✅ Make trace properties readable (avoid [object Object])
              let description = "";
              for (const propertyName in properties) {
                if (
                  Object.prototype.hasOwnProperty.call(
                    properties,
                    propertyName,
                  ) &&
                  typeof properties[propertyName] !== "function"
                ) {
                  const propNameWithoutUnderscore = propertyName.replace(
                    /^_/,
                    "",
                  );
                  const valProp = properties[propertyName];
                  const val =
                    valProp && typeof valProp.getValue === "function"
                      ? valProp.getValue(now)
                      : valProp;

                  description += `${propNameWithoutUnderscore}: ${val}<br />`;
                }
              }

              entity.isFault = true;
              entity.description = description;

            entity.isEarthquake = true;

            if (entity.position) {
              let coordinates = Cesium.Cartographic.fromCartesian(
                entity.position.getValue(now),
              );
              let depthInMeters = coordinates.height * 1000;
              entity.position = new Cesium.ConstantPositionProperty(
                Cesium.Cartesian3.fromDegrees(
                  Cesium.Math.toDegrees(coordinates.longitude),
                  Cesium.Math.toDegrees(coordinates.latitude),
                  -depthInMeters,

              pixelSize: calculateMarkerSize(

                entity.properties.mag.getValue(),
              ),
              color: eqColor,

      // Outline box for CVM.
      function updateBoxOutline(
        minLat,
        maxLat,
        minLon,
        maxLon,
        minDepth,
        maxDepth,
        alpha,
      ) {
        const minDepthScaled = minDepth * -1000;
        const maxDepthScaled = maxDepth * -1000;

        const topPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
          minLon,
          minLat,
          minDepthScaled,
          maxLon,
          minLat,
          minDepthScaled,
          maxLon,
          maxLat,
          minDepthScaled,
          minLon,
          maxLat,
          minDepthScaled,
        ]);

        const bottomPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
          minLon,
          minLat,
          maxDepthScaled,
          maxLon,
          minLat,
          maxDepthScaled,
          maxLon,
          maxLat,
          maxDepthScaled,
          minLon,
          maxLat,
          maxDepthScaled,
        ]);

        const northPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
          minLon,
          maxLat,
          minDepthScaled,
          maxLon,
          maxLat,
          minDepthScaled,
          maxLon,
          maxLat,
          maxDepthScaled,
          minLon,
          maxLat,
          maxDepthScaled,
        ]);

        const southPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
          minLon,
          minLat,
          minDepthScaled,
          maxLon,
          minLat,
          minDepthScaled,
          maxLon,
          minLat,
          maxDepthScaled,
          minLon,
          minLat,
          maxDepthScaled,
        ]);

        const eastPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
          maxLon,
          minLat,
          minDepthScaled,
          maxLon,
          maxLat,
          minDepthScaled,
          maxLon,
          maxLat,
          maxDepthScaled,
          maxLon,
          minLat,
          maxDepthScaled,
        ]);

        const westPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
          minLon,
          minLat,
          minDepthScaled,
          minLon,
          maxLat,
          minDepthScaled,
          minLon,
          maxLat,
          maxDepthScaled,
          minLon,
          minLat,
          maxDepthScaled,
        ]);

        // Helper function to create and add polygon entity
        function addPolygonEntity(positions, alpha, name) {
          // Add a polyline entity for a thicker outline with transparency
          const line = viewer.entities.add({
            name: name + " outline",
            polyline: {
              positions,
              width: cvmLineWidth[0],
              material: cvmOutlineColor.withAlpha(1.0),
            },
          });
          const poly = viewer.entities.add({
            name: name,
            polygon: {
              hierarchy: new Cesium.PolygonHierarchy(positions),
              material: cvmFaceColor.withAlpha(alpha),
              perPositionHeight: true,
              outline: true,
              outlineColor: cvmOutlineColor,
            },
          });
          return [poly, line];
        }

        // Remove existing entities if they exist
        if (boxEntities) {
          boxEntities.forEach(entity => viewer.entities.remove(entity));
        }
        boxEntities = [];

        // Add polygons for all six faces
        boxEntities.push(
          ...addPolygonEntity(topPositions, alpha, "Top Surface"),
        );
        boxEntities.push(
          ...addPolygonEntity(bottomPositions, alpha, "Bottom Surface"),
        );
        boxEntities.push(
          ...addPolygonEntity(northPositions, alpha, "North Surface"),
        );
        boxEntities.push(
          ...addPolygonEntity(southPositions, alpha, "South Surface"),
        );
        boxEntities.push(
          ...addPolygonEntity(eastPositions, alpha, "East Surface"),
        );
        boxEntities.push(
          ...addPolygonEntity(westPositions, alpha, "West Surface"),
        );
      }

            viewer.selectedEntity = ent;

            // OPTIONAL: still allow distance measurement using the entity position
            if (document.getElementById("clearCheckbox").checked) {
              const now = Cesium.JulianDate.now();
              const pos =
                ent.position && ent.position.getValue
                  ? ent.position.getValue(now)
                  : scene.pickPosition(click.position);

              if (pos) {
                points.push(pos);
                if (points.length >= 2) {
                  const distance = Cesium.Cartesian3.distance(
                    points[points.length - 2],
                    points[points.length - 1],
                  );
                  updateDistanceDisplay(distance);
                  const line = viewer.entities.add({
                    polyline: {
                      positions: points,
                      width: 2,
                      material: Cesium.Color.TEAL,
                    },
                  });
                  distanceEntities.push(line);
                }
              }
            }

            return; // IMPORTANT: do NOT fall through to the coord block
          }
          // Any other picked entity: treat like background → fall through
        }

        // 2) Background (or non-fault/non-EQ) click → show coordinates/depth
        // Prefer pickPosition (works with 3D + depth), fall back to ellipsoid if needed
        let cartesian = scene.pickPosition(click.position);
        if (!cartesian) {
          cartesian = viewer.camera.pickEllipsoid(
            click.position,
            scene.globe.ellipsoid,
          );
        }

        if (cartesian) {
          const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
          const lon = Cesium.Math.toDegrees(cartographic.longitude);
          const lat = Cesium.Math.toDegrees(cartographic.latitude);
          const heightMeters = cartographic.height; // positive up in meters
          const depthKm = -heightMeters / 1000.0; // negative height → depth

          mapClickEntity.name = "Map Location";
          mapClickEntity.description =
            `Latitude: ${lat.toFixed(3)}°<br>` +
            `Longitude: ${lon.toFixed(3)}°<br>` +
            `Depth: ${depthKm.toFixed(2)} km`;

          viewer.selectedEntity = mapClickEntity;

          // 3) Distance measurement using the same point
          if (document.getElementById("clearCheckbox").checked) {
            points.push(cartesian);

            if (points.length >= 2) {
              const distance = Cesium.Cartesian3.distance(
                points[points.length - 2],
                points[points.length - 1],
              );
              updateDistanceDisplay(distance);
              const line = viewer.entities.add({
                polyline: {
                  positions: points,
                  width: 2,
                  material: Cesium.Color.TEAL,
                },
              });
              distanceEntities.push(line);
            }
          }
        } else {
          // Couldn’t project click → hide infoBox
          viewer.selectedEntity = undefined;
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      document
        .getElementById("clearCheckbox")
        .addEventListener("change", function () {
          if (!this.checked) {
            clearDistance();
          }
        });

      document
        .getElementById("toggleGlobeCheckbox")
        .addEventListener("change", function () {
          viewer.scene.globe.show = this.checked;
        });
    </script>
  </body>
</html>
