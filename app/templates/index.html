{% extends 'cfm_page.html' %}

{% block style%}
<link rel="stylesheet" href="/static/css/main.css" />
<script src="https://cesium.com/downloads/cesiumjs/releases/1.82/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.82/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<!-- Include Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider/distribute/nouislider.min.css">
<script src="https://cdn.jsdelivr.net/npm/nouislider/distribute/nouislider.min.js"></script>

<!-- Load repository_config.js synchronously 
         Synchronous XHR ensures loading order: The browser halts execution until repository_config.js is fetched and executed, 
        ensuring that all variables are available. If repository_config.js fails to load, a console error message will help diagnose issues.
        xhrs block the browser’s rendering and prevent the user from interacting with the page until the request completes. However, this
        pause shoud be brief.-->
<script>
    // Dynamically create and load the configuration script synchronously before loading other scripts
    let branch = "{{ branch }}";
    let configFilePath = `/static/config/${branch === "main" ? "" : branch + "/"}repository_config.js`;

    if (branch !== "main" && branch !== "prod") {
        alert("[WARN] Loading configuration from the branch: [" + branch + "]\n" + configFilePath);
    }

    // Load repository_config.js synchronously to ensure its variables are available before other scripts run
    let xhr = new XMLHttpRequest();
    xhr.open('GET', configFilePath, false); // `false` makes the request synchronous
    xhr.onload = function () {
        if (xhr.status === 200) {
            let script = document.createElement('script');
            script.text = xhr.responseText;
            document.head.appendChild(script);

            // >>> LOG the cfmTraceData URL as soon as it's available
            try {
                if (typeof cfmTraceData !== "undefined") {
                    const resolved =
                        typeof cfmTraceData === "function" ? cfmTraceData() : cfmTraceData;
                    // Make it absolute for clarity in the console
                    const absolute = new URL(resolved, location.origin).href;
                    console.info("[CFM] cfmTraceData URL:", absolute);
                } else {
                    console.warn("[CFM] cfmTraceData is not defined by:", configFilePath);
                }
            } catch (e) {
                console.error("[CFM] Failed to resolve cfmTraceData:", e);
            }
            // <<<

            // Function to capitalize the branch name
            function capitalizeBranchName(branch) {
                return branch.charAt(0).toUpperCase() + branch.slice(1);
            }
            // Dynamically update the page title if the branch is not "main"
            if (branch !== "main") {
                let currentTitle = document.title;
                let domain = window.location.hostname;
                let capitalizedBranch = capitalizeBranchName(branch);
                document.title = `[${capitalizedBranch} - ${domain}] ${currentTitle}`;

            }
        } else {
            console.error("Failed to load repository_config.js");
        }
    };
    xhr.send(null);
</script>



{%endblock%}
{% block body %}
<!-- Full-width map with floating cards (overrides default container layout) -->
<div id="viewer2dWrapper">
    <div id="mapContainer"></div>
    <div id="mapLoading" class="map-loading-overlay">
        <div class="map-spinner"></div>
        <div class="map-loading-text">Loading fault data…</div>
    </div>

    <!-- Toggle button for sidebar -->
    <button id="toggleSidebar" class="btn-toggle-sidebar" title="Show/Hide Controls">&#9776;</button>

    <!-- Floating sidebar -->
    <div id="sidebarPanel">

        <!-- Card 1: Filters -->
        <div class="card-2d">
            <div class="card-2d-title">CFM Fault Traces</div>

            <div id="mapControls">
                <!-- Longitude -->
                <div class="accordion-section open">
                    <button class="accordion-header" type="button">
                        <span class="accordion-arrow">&#9662;</span>
                        <span class="accordion-label">LONGITUDE (°EAST)</span>
                        <span class="accordion-range"><span id="minLongitudeValue">-130.0°</span> &ndash; <span id="maxLongitudeValue">-116.0°</span></span>
                    </button>
                    <div class="accordion-body">
                        <div id="longitudeSlider" class="accordion-slider"></div>
                    </div>
                </div>

                <!-- Latitude -->
                <div class="accordion-section open">
                    <button class="accordion-header" type="button">
                        <span class="accordion-arrow">&#9662;</span>
                        <span class="accordion-label">LATITUDE (°NORTH)</span>
                        <span class="accordion-range"><span id="minLatitudeValue">39.0°</span> &ndash; <span id="maxLatitudeValue">52.0°</span></span>
                    </button>
                    <div class="accordion-body">
                        <div id="latitudeSlider" class="accordion-slider"></div>
                    </div>
                </div>

                <!-- Depth -->
                <div class="accordion-section open">
                    <button class="accordion-header" type="button">
                        <span class="accordion-arrow">&#9662;</span>
                        <span class="accordion-label">DEPTH RANGE</span>
                        <span class="accordion-range"><span id="minDepthValue">0.0 km</span> &ndash; <span id="maxDepthValue">50.0 km</span></span>
                    </button>
                    <div class="accordion-body">
                        <div id="depthSlider" class="accordion-slider"></div>
                    </div>
                </div>

                <!-- Fault Color -->
                <div class="accordion-section open">
                    <button class="accordion-header" type="button">
                        <span class="accordion-arrow">&#9662;</span>
                        <span class="accordion-label">FAULT COLOR</span>
                    </button>
                    <div class="accordion-body">
                        <div class="color-controls">
                            <select id="colorSelector" onchange="updateLabels()">
                                <option value="Black">Black</option>
                                <option value="Blue">Blue</option>
                                <option value="DipColorMap">Color by Dip</option>
                                <option value="RakeColorMap">Color by Rake</option>
                                <option value="SlipRateColorMap">Color by Slip Rate</option>
                                <option value="FaultLevelColor">Color by Fault Level</option>
                                <option value="RegionColor">Color by Region</option>
                                <option value="SlipSenseColor">Color by Slip Sense</option>
                            </select>
                            <div class="color-range-row">
                                <label for="minColor" id="minColorLabel">min.</label>
                                <input type="number" id="minColor" style="width:48px;" />
                                <span id="minColorUnit"></span>
                                <div id="colorBarMin" class="color-bar" style="background-color: red;">&nbsp;</div>
                                <label for="maxColor" id="maxColorLabel">max.</label>
                                <input type="number" id="maxColor" style="width:48px;">
                                <span id="maxColorUnit"></span>
                                <div id="colorBarMax" class="color-bar" style="background-color: blue;">&nbsp;</div>
                            </div>
                            <div id="colorBarNote" class="notes"></div>
                            <div id="colorLegend" style="display:none;"></div>
                        </div>
                    </div>
                </div>

                <!-- Overlays -->
                <div class="accordion-section open">
                    <button class="accordion-header" type="button">
                        <span class="accordion-arrow">&#9662;</span>
                        <span class="accordion-label">OVERLAYS</span>
                    </button>
                    <div class="accordion-body">
                        <div class="overlay-toggle">
                            <label>
                                <input type="checkbox" id="toggleEQCheckbox" checked>
                                <span class="legend-dot eq-dot" aria-hidden="true"></span>
                                U.S. Geological Survey Earthquake Catalog<sup>1</sup> (M&ge;4, 1970&ndash;Present), Circle Size &prop; Magnitude
                            </label>
                        </div>
                        <div class="overlay-toggle">
                            <label>
                                <input type="checkbox" id="toggleQFFCheckbox">
                                U.S. Geological Survey Quaternary Fault and Fold Database<sup>2</sup>
                                <span id="qffLoading" style="display:none; margin-left:4px; font-size:11px; color:#94a3b8;">loading&hellip;</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion-footer">
                <button id="resetFiltersBtn" class="btn-reset">Reset Filters</button>
            </div>
        </div>

        <!-- Card 2: Fault Objects -->
        <div class="card-2d">
            <div class="card-2d-title">CFM Fault Objects <span id="faultCount" class="fault-count-badge"></span></div>
            <div id="buttonRow">
                <button id="view3DButton">View 3D</button>
                <button id="downloadSelectedBtn">&#x2B07; Download (1 km)</button>
            </div>
            <div class="card-2d-row">
                <label class="card-2d-check"><input type="checkbox" id="selectAllCheckbox" /> Select/Deselect All</label>
                <div id="toggleVisibilityLabel" style="cursor:pointer; display:inline-flex; align-items:center; gap:4px;">
                    <i id="toggleVisibilityIcon" class="fas fa-eye"></i>
                    <span>Show/Hide All</span>
                </div>
            </div>
            <div class="table-holder">
                <table id="lineList">
                </table>
            </div>
        </div>

    </div>
</div>


<script>


    document.addEventListener('DOMContentLoaded', function () {
        // Accordion toggle
        document.querySelectorAll('.accordion-header').forEach(function (btn) {
            btn.addEventListener('click', function () {
                this.closest('.accordion-section').classList.toggle('open');
            });
        });

        // Define the coordinates and other configuration variables
        const delta = 0.1;
        const startDepth = 0;
        const endDepth = 50;

        // Which branch we are looking into
        const url = new URL(window.location.href);
        const branch = url.searchParams.get('branch') || '{{ branch }}';

        // ── noUiSlider dual-range sliders ──
        function createDualSlider(elementId, min, max, startVals, step, minSpanId, maxSpanId, unit) {
            var el = document.getElementById(elementId);
            noUiSlider.create(el, {
                start: startVals,
                connect: true,
                step: step,
                range: { min: min, max: max },
                tooltips: false
            });
            el.noUiSlider.on('update', function (values) {
                document.getElementById(minSpanId).textContent = parseFloat(values[0]).toFixed(1) + unit;
                document.getElementById(maxSpanId).textContent = parseFloat(values[1]).toFixed(1) + unit;
            });
            return el;
        }

        var lonSlider = createDualSlider('longitudeSlider', west - delta * 5, east + delta * 5, [west, east], 0.1, 'minLongitudeValue', 'maxLongitudeValue', '°');
        var latSlider = createDualSlider('latitudeSlider', south - delta * 5, north + delta * 5, [south, north], 0.1, 'minLatitudeValue', 'maxLatitudeValue', '°');
        var depthSlider = createDualSlider('depthSlider', startDepth, endDepth, [startDepth, endDepth], 0.5, 'minDepthValue', 'maxDepthValue', ' km');

        // Helper to read slider values (used by updateVisibility and updateFilterRectangle)
        function getSliderValues() {
            var lon = lonSlider.noUiSlider.get().map(Number);
            var lat = latSlider.noUiSlider.get().map(Number);
            var dep = depthSlider.noUiSlider.get().map(Number);
            return { minLon: lon[0], maxLon: lon[1], minLat: lat[0], maxLat: lat[1], minDepth: dep[0], maxDepth: dep[1] };
        }

        // To control the "Home" button zoom area:
        // Set the "default" camera view prior to constructing the Viewer widget, 
        // and this is used both for the initial view and for the "Home" button view.
        // Set this using static properties DEFAULT_VIEW_FACTOR and DEFAULT_VIEW_RECTANGLE on the Camera class.

        var rectangle = Cesium.Rectangle.fromDegrees(west, south, east, north);

        Cesium.Camera.DEFAULT_VIEW_FACTOR = 0;
        Cesium.Camera.DEFAULT_VIEW_RECTANGLE = rectangle;

        // NOTE: Viewer constructed after default view is set.

        // Cesium Viewer instance
        console.log("Setting viewer ");// + Cesium.Ion.defaultAccessToken)
        const viewer = new Cesium.Viewer('mapContainer', {
            imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer'
            }),
            fullscreenButton: false,  // Disable the default fullscreen button
            navigationInstructionsInitiallyVisible: true,
            baseLayerPicker: false,
            infoBox: true
        });



        viewer.scene.globe.baseColor = Cesium.Color.TRANSPARENT;
        viewer.animation.container.style.visibility = 'hidden';
        viewer.timeline.container.style.visibility = 'hidden';
        const areaRectangle = Cesium.Rectangle.fromDegrees(west, south, east, north);
        viewer.camera.setView({ destination: areaRectangle });

        const view3DButton = document.getElementById('view3DButton');

        // Sidebar toggle
        document.getElementById('toggleSidebar').addEventListener('click', function () {
            var panel = document.getElementById('sidebarPanel');
            panel.style.display = panel.style.display === 'none' ? '' : 'none';
        });


        // Fetch earthquake data from USGS API
        var eqEntities = [];
        fetch(eqQueryUrl)
            .then(response => response.json())
            .then(data => {
                data.features.forEach(feature => {
                    const coords = feature.geometry.coordinates;
                    const magnitude = feature.properties.mag;

                    var e = viewer.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(coords[0], coords[1]),
                        ellipse: {
                            semiMinorAxis: 50 * Math.pow(magnitude, 3),
                            semiMajorAxis: 50 * Math.pow(magnitude, 3),
                            material: Cesium.Color.YELLOW.withAlpha(0.5)
                        },
                        description: `Magnitude: ${magnitude}<br>Location: (${coords[1]}, ${coords[0]})<br>Depth: ${coords[2]} km`
                    });
                    eqEntities.push(e);
                });
            })
            .catch(error => console.error('Error fetching earthquake data:', error));

        // Toggle earthquake visibility
        document.getElementById('toggleEQCheckbox').addEventListener('change', function () {
            var show = this.checked;
            eqEntities.forEach(function (e) { e.show = show; });
        });

        // USGS Quaternary Fault and Fold Database toggle
        let qffDataSource = null;
        const qffUrl = 'https://raw.githubusercontent.com/cascadiaquakes/CRESCENT-CFM/main/misc_data/USGSQFFD_pnwextract.geojson';
        document.getElementById('toggleQFFCheckbox').addEventListener('change', function () {
            var loadingEl = document.getElementById('qffLoading');
            if (this.checked) {
                if (qffDataSource) {
                    viewer.dataSources.add(qffDataSource);
                } else {
                    loadingEl.style.display = 'inline';
                    Cesium.GeoJsonDataSource.load(qffUrl, {
                        stroke: Cesium.Color.RED.withAlpha(0.7),
                        fill: Cesium.Color.RED.withAlpha(0.2),
                        strokeWidth: 2
                    }).then(function (ds) {
                        qffDataSource = ds;
                        viewer.dataSources.add(ds);
                        loadingEl.style.display = 'none';
                    }).catch(function (err) {
                        console.error('Error loading USGS QFF data:', err);
                        loadingEl.textContent = 'failed';
                    });
                }
            } else {
                if (qffDataSource && viewer.dataSources.contains(qffDataSource)) {
                    viewer.dataSources.remove(qffDataSource);
                }
            }
        });

        // Download selected high-res (1 km) fault GeoJSON files
        document.getElementById('downloadSelectedBtn').addEventListener('click', async function () {
            const checkboxes = document.querySelectorAll('#lineList input[type="checkbox"]:checked');
            if (checkboxes.length === 0) {
                alert('Please select at least one fault before downloading.');
                return;
            }
            const faults = Array.from(checkboxes).map(cb => {
                var row = cb.closest('tr');
                var name = row ? row.querySelector('td:nth-child(3)') : null;
                return { id: cb.value, name: name ? name.textContent.trim() : cb.value };
            });
            var dataBranch = (branch === 'prod') ? 'dev' : branch;
            const baseUrl = 'https://raw.githubusercontent.com/cascadiaquakes/CRESCENT-CFM/'
                + encodeURIComponent(dataBranch) + '/crescent_cfm_files/hires_faults/';

            for (const fault of faults) {
                const url = baseUrl + fault.id + '_hires.geojson';
                var filename = fault.name.replace(/\s+/g, '_') + '_hires.geojson';
                try {
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(resp.status);
                    const blob = await resp.blob();
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(a.href);
                } catch (err) {
                    console.error('Failed to download fault ' + fault.id + ':', err);
                }
            }
        });

        view3DButton.addEventListener('click', function () {
            const checkboxes = document.querySelectorAll('#lineList input[type="checkbox"]:checked');
            if (checkboxes.length === 0) {
                // No checkboxes are selected, display an error message
                alert('Please select at least one fault before proceeding.');
                return; // Stop further execution
            }

            // If there are selected checkboxes, proceed with the original functionality
            const selectedLines = Array.from(checkboxes).map(cb => cb.value); // Get the value (id) of the checkbox

            // Store selected lines in localStorage or pass to another page
            localStorage.setItem('selectedLines', JSON.stringify(selectedLines));

            // Open the new page in a new tab
            const backend3d = `/3d?branch=${encodeURIComponent(branch)}`
            console.log("backend3d= %s", backend3d)

            const newTab = window.open(backend3d);
            if (!newTab) {
                alert('Popup blocked. Please allow popups for this site.');
                return;
            }
        });


        // Map controls are now always visible in the sidebar card

        // Reset all filters to defaults
        document.getElementById('resetFiltersBtn').addEventListener('click', function () {
            // Reset sliders
            lonSlider.noUiSlider.set([west, east]);
            latSlider.noUiSlider.set([south, north]);
            depthSlider.noUiSlider.set([startDepth, endDepth]);

            // Reset color
            document.getElementById('colorSelector').value = 'Black';
            updateLabels();
            updateFeatureColors('Black', viewer);

            // Reset filter rectangle + visibility
            updateFilterRectangle();
            if (typeof geoJsonEntities !== 'undefined') {
                updateVisibility(geoJsonEntities, document.getElementById('lineList'));
            }

            // Uncheck QFF if on
            var qffCb = document.getElementById('toggleQFFCheckbox');
            if (qffCb.checked) {
                qffCb.checked = false;
                qffCb.dispatchEvent(new Event('change'));
            }

            // Deselect all fault checkboxes
            document.querySelectorAll('#lineList input[type="checkbox"]:checked').forEach(function (cb) {
                cb.checked = false;
                cb.dispatchEvent(new Event('change'));
            });
            document.getElementById('selectAllCheckbox').checked = false;
        });

        // Get references to the input elements by their IDs
        const colorSelector = document.getElementById('colorSelector');
        const minColorInput = document.getElementById('minColor');
        const maxColorInput = document.getElementById('maxColor');

        // Function to update feature colors, assuming viewer is available
        function triggerColorUpdate() {
            updateFeatureColors(colorSelector.value, viewer);
        }

        // Attach event listeners to the input elements
        // For color selection dropdown
        colorSelector.addEventListener('change', triggerColorUpdate);

        // For min and max color value inputs
        minColorInput.addEventListener('input', triggerColorUpdate);
        maxColorInput.addEventListener('input', triggerColorUpdate);

        document.getElementById('minColor').addEventListener('input', () => updateAllFeatureColors(viewer));
        document.getElementById('maxColor').addEventListener('input', () => updateAllFeatureColors(viewer));

        function updateAllFeatureColors(viewer) {
            const selectedColor = document.getElementById('colorSelector').value;
            updateFeatureColors(selectedColor, viewer);
        }


        function getColorFromValue(value, minValue, maxValue) {
            // Normalize the value within the range of minValue to maxValue
            const fraction = (value - minValue) / (maxValue - minValue);
            const clampedFraction = Math.max(0, Math.min(1, fraction));

            // Calculate the red and blue components based on the clamped fraction
            const red = Math.floor(255 * (1 - clampedFraction));
            const blue = Math.floor(255 * clampedFraction);
            const green = 0;

            // Create a Cesium Color object
            const cesiumColor = Cesium.Color.fromBytes(red, green, blue);

            // Create an RGB string
            const rgbString = `rgb(${red}, ${green}, ${blue})`;

            // Return both the Cesium Color object and the RGB string
            return {
                cesiumColor: cesiumColor,
                rgbString: rgbString
            };
        }


        // Categorical color palette for discrete values
        const categoryPalette = [
            Cesium.Color.fromCssColorString('#e6194b'),
            Cesium.Color.fromCssColorString('#3cb44b'),
            Cesium.Color.fromCssColorString('#4363d8'),
            Cesium.Color.fromCssColorString('#f58231'),
            Cesium.Color.fromCssColorString('#911eb4'),
            Cesium.Color.fromCssColorString('#42d4f4'),
            Cesium.Color.fromCssColorString('#f032e6'),
            Cesium.Color.fromCssColorString('#aa6e28'),
            Cesium.Color.fromCssColorString('#fabed4'),
            Cesium.Color.fromCssColorString('#469990'),
            Cesium.Color.fromCssColorString('#dcbeff'),
            Cesium.Color.fromCssColorString('#ffe119'),
        ];
        const categoryColorMaps = {};

        // Discrete slip rate bins (mm/yr) with assigned colors
        const slipRateBins = [
            { min: 0, max: 1,       label: '0 – 1',  color: Cesium.Color.fromCssColorString('#2166ac') },
            { min: 1, max: 2,       label: '1 – 2',  color: Cesium.Color.fromCssColorString('#4393c3') },
            { min: 2, max: 3,       label: '2 – 3',  color: Cesium.Color.fromCssColorString('#92c5de') },
            { min: 3, max: 4,       label: '3 – 4',  color: Cesium.Color.fromCssColorString('#d1e5f0') },
            { min: 4, max: 5,       label: '4 – 5',  color: Cesium.Color.fromCssColorString('#fddbc7') },
            { min: 5, max: 6,       label: '5 – 6',  color: Cesium.Color.fromCssColorString('#f4a582') },
            { min: 6, max: 7,       label: '6 – 7',  color: Cesium.Color.fromCssColorString('#d6604d') },
            { min: 7, max: Infinity, label: '7+',     color: Cesium.Color.fromCssColorString('#b2182b') },
        ];

        function getSlipRateBinColor(value) {
            if (!Number.isFinite(value)) return Cesium.Color.GRAY;
            for (var i = 0; i < slipRateBins.length; i++) {
                if (value >= slipRateBins[i].min && value < slipRateBins[i].max) return slipRateBins[i].color;
            }
            return slipRateBins[slipRateBins.length - 1].color;
        }

        function getCategoryColor(mapName, value) {
            if (!value) return Cesium.Color.GRAY;
            if (!categoryColorMaps[mapName]) categoryColorMaps[mapName] = {};
            const map = categoryColorMaps[mapName];
            if (!(value in map)) {
                map[value] = categoryPalette[Object.keys(map).length % categoryPalette.length];
            }
            return map[value];
        }

        function updateFeatureColors(selectedColor, viewer) {
            viewer.entities.values.forEach(entity => {
                if (entity.polyline) {
                    let color;
                    if (selectedColor === 'RakeColorMap' && 'rake' in entity) {
                        toggleColorInputs(true);
                        const minRake = parseFloat(document.getElementById('minColor').value);
                        const maxRake = parseFloat(document.getElementById('maxColor').value);
                        color = getColorFromValue(entity.rake, minRake, maxRake).cesiumColor;
                    } else if (selectedColor === 'DipColorMap' && 'dip' in entity) {
                        toggleColorInputs(true);
                        const minDip = parseFloat(document.getElementById('minColor').value);
                        const maxDip = parseFloat(document.getElementById('maxColor').value);
                        color = getColorFromValue(entity.dip, minDip, maxDip).cesiumColor;
                    } else if (selectedColor === 'SlipRateColorMap' && 'slipRate' in entity) {
                        toggleColorInputs(false);
                        color = getSlipRateBinColor(entity.slipRate);
                    } else if (selectedColor === 'FaultLevelColor') {
                        toggleColorInputs(false);
                        color = getCategoryColor('faultLevel', entity.faultLevel);
                    } else if (selectedColor === 'RegionColor') {
                        toggleColorInputs(false);
                        color = getCategoryColor('region', entity.region);
                    } else if (selectedColor === 'SlipSenseColor') {
                        toggleColorInputs(false);
                        color = getCategoryColor('slipSense', entity.slipSense);
                    } else if (selectedColor === 'Black') {
                        color = Cesium.Color.BLACK;
                        toggleColorInputs(false);
                    } else if (selectedColor === 'Blue') {
                        color = Cesium.Color.BLUE;
                        toggleColorInputs(false);
                    } else {
                        color = Cesium.Color.BLACK;
                        toggleColorInputs(false);
                    }
                    entity.polyline.material = new Cesium.ColorMaterialProperty(color);
                    //alert("Color set to:" + color);
                }
            });
            viewer.scene.requestRender();

            // Build legend for categorical modes
            var legendEl = document.getElementById('colorLegend');
            if (selectedColor === 'SlipRateColorMap') {
                var html = '<div class="color-legend-title">Slip Rate (mm/yr)</div>';
                slipRateBins.forEach(function (bin) {
                    var c = bin.color;
                    var css = 'rgb(' + Math.round(c.red*255) + ',' + Math.round(c.green*255) + ',' + Math.round(c.blue*255) + ')';
                    html += '<div class="color-legend-item"><span class="color-legend-swatch" style="background:' + css + '"></span>' + bin.label + '</div>';
                });
                // Add gray for unknown
                html += '<div class="color-legend-item"><span class="color-legend-swatch" style="background:gray"></span>No data</div>';
                legendEl.innerHTML = html;
                legendEl.style.display = '';
            } else {
                var catKey = selectedColor === 'FaultLevelColor' ? 'faultLevel'
                           : selectedColor === 'RegionColor' ? 'region'
                           : selectedColor === 'SlipSenseColor' ? 'slipSense'
                           : null;
                if (catKey && categoryColorMaps[catKey]) {
                    var entries = Object.entries(categoryColorMaps[catKey]);
                    entries.sort(function (a, b) { return a[0].localeCompare(b[0]); });
                    var html = '<div class="color-legend-title">Legend</div>';
                    entries.forEach(function (pair) {
                        var label = pair[0] || '(empty)';
                        var c = pair[1];
                        var css = 'rgb(' + Math.round(c.red*255) + ',' + Math.round(c.green*255) + ',' + Math.round(c.blue*255) + ')';
                        html += '<div class="color-legend-item"><span class="color-legend-swatch" style="background:' + css + '"></span>' + label + '</div>';
                    });
                    legendEl.innerHTML = html;
                    legendEl.style.display = '';
                } else {
                    legendEl.innerHTML = '';
                    legendEl.style.display = 'none';
                }
            }
        }

        function updateColorBars() {
            const minColorValue = parseFloat(document.getElementById('minColor').value);
            const maxColorValue = parseFloat(document.getElementById('maxColor').value);
            const minColor = getColorFromValue(minColorValue, minColorValue, maxColorValue).rgbString;
            const maxColor = getColorFromValue(maxColorValue, minColorValue, maxColorValue).rgbString;

            // Assuming colors are returned as strings suitable for CSS (e.g., "rgb(255,0,0)")
            document.getElementById('colorBarMin').style.backgroundColor = minColor;
            document.getElementById('colorBarMax').style.backgroundColor = maxColor;
        }

        document.getElementById('minColor').addEventListener('input', () => updateColorBars());
        document.getElementById('maxColor').addEventListener('input', () => updateColorBars());
        toggleColorInputs(false);
        function toggleColorInputs(enabled) {
            // Reference input and color bar elements
            const minColorInput = document.getElementById('minColor');
            const maxColorInput = document.getElementById('maxColor');
            const colorBarMin = document.getElementById('colorBarMin');
            const colorBarMax = document.getElementById('colorBarMax');
            const minColorInputLabel = document.getElementById('minColorLabel');
            const maxColorInputLabel = document.getElementById('maxColorLabel');

            // Enable or disable input fields
            minColorInput.disabled = !enabled;
            maxColorInput.disabled = !enabled;

            // Adjust the color bars visibility based on the enabled status
            if (enabled) {
                colorBarMin.style.opacity = '1'; // Make it fully visible
                colorBarMax.style.opacity = '1'; // Make it fully visible
                minColorInputLabel.style.color = "BLACK"; // Make it fully visible
                maxColorInputLabel.style.color = "BLACK"; // Make it fully visible
                //maxColorInputLabel.style.backgroundColor = colorBarMax
            } else {
                colorBarMin.style.opacity = '0.3'; // Reduce visibility
                colorBarMax.style.opacity = '0.3'; // Reduce visibility
                minColorInputLabel.style.color = "GRAY"; // Reduce visibility
                maxColorInputLabel.style.color = "GRAY"; // Reduce visibility
            }
        }



        let filterRectangle = viewer.entities.add({
            rectangle: {
                coordinates: Cesium.Rectangle.fromDegrees(west, south, east, north),
                material: Cesium.Color.GRAY.withAlpha(0.2),
                outline: true,
                outlineColor: Cesium.Color.GRAY
            }
        });

        // Update the filter rectangle overlay on the map
        function updateFilterRectangle() {
            var v = getSliderValues();
            filterRectangle.rectangle.coordinates = Cesium.Rectangle.fromDegrees(v.minLon, v.minLat, v.maxLon, v.maxLat);
            viewer.scene.requestRender();
        }

        // Wire sliders to filter rectangle
        lonSlider.noUiSlider.on('slide', updateFilterRectangle);
        latSlider.noUiSlider.on('slide', updateFilterRectangle);
        updateFilterRectangle();


        const geoJsonEntities = {};

        // include branch when call the GEOJSON route
        const GeojsonData = `/geojson?branch=${encodeURIComponent(branch)}`
        console.log("Loading GeojsonData= %s", GeojsonData)
        fetch(GeojsonData)
            .then(response => response.json())
            .then(data => {
                const lineList = document.getElementById('lineList');
                const selectAllCheckbox = document.getElementById('selectAllCheckbox');

                document.getElementById('toggleVisibilityLabel').addEventListener('click', function () {
                    const visibilityIcons = document.querySelectorAll('#lineList .fa-eye');
                    const allVisible = Array.from(visibilityIcons).every(icon => icon.style.color !== 'grey');

                    visibilityIcons.forEach(icon => {
                        icon.click(); // Trigger the click event on each eye icon
                    });

                    const toggleVisibilityIcon = document.getElementById('toggleVisibilityIcon');
                    if (allVisible) {
                        toggleVisibilityIcon.style.color = 'grey'; // Set to grey if all were previously visible
                    } else {
                        toggleVisibilityIcon.style.color = 'black'; // Set to black if any were previously invisible
                    }
                });

                selectAllCheckbox.addEventListener('change', function () {
                    const checkboxes = document.querySelectorAll('#lineList input[type="checkbox"]');
                    checkboxes.forEach((checkbox) => {
                        // Get the parent row of the checkbox
                        let parentRow = checkbox.closest('tr');
                        // Check if the row is visible by checking its display style
                        if (parentRow.style.display !== 'none') {
                            checkbox.checked = this.checked;
                            checkbox.dispatchEvent(new Event('change'));
                            // Just make sure the unselected checkboxes are not checked from the previous run.
                        } else { checkbox.checked = !this.checked; }
                    });
                });

                populateLineList(data, lineList, geoJsonEntities, viewer);

                // Update fault count badge
                var totalFaults = Object.keys(geoJsonEntities).length;
                document.getElementById('faultCount').textContent = totalFaults;

                // Hide loading spinner
                document.getElementById('mapLoading').style.display = 'none';

                lonSlider.noUiSlider.on('slide', () => {
                    updateVisibility(geoJsonEntities, lineList);
                    updateFaultCount();
                });
                latSlider.noUiSlider.on('slide', () => {
                    updateVisibility(geoJsonEntities, lineList);
                    updateFaultCount();
                });
                depthSlider.noUiSlider.on('slide', () => {
                    updateVisibility(geoJsonEntities, lineList);
                    updateFaultCount();
                });

                function updateFaultCount() {
                    var visible = 0;
                    Object.keys(geoJsonEntities).forEach(function (id) {
                        if (geoJsonEntities[id].show) visible++;
                    });
                    document.getElementById('faultCount').textContent = visible;
                }

            })
            .catch(error => console.error('Error fetching GeoJSON:', error));

        function populateLineList(data, lineList, entities, viewer) {
            // Helpers
            const coerceNumber = (v, fallback = 0) => {
                const n = typeof v === 'string' ? parseFloat(v) : (typeof v === 'number' ? v : NaN);
                return Number.isFinite(n) ? n : fallback;
            };
            const toStr = (v, fallback = '') => (v == null ? fallback : String(v));

            // Header (unchanged)
            const headerRow = document.createElement('tr');
            ['', '', 'Fault Name', 'Dip (°)', 'Rake (°)', 'Level', 'Region', 'ID'].forEach(text => {
                const header = document.createElement('th');
                header.textContent = text;
                if (text === 'ID') header.classList.add('hidden-id-column');
                headerRow.appendChild(header);
            });
            lineList.appendChild(headerRow);

            // Sort features alphabetically by name
            var sortedFeatures = (data.features || []).slice().sort(function (a, b) {
                var nameA = ((a.properties || {}).name || '').toLowerCase();
                var nameB = ((b.properties || {}).name || '').toLowerCase();
                return nameA.localeCompare(nameB);
            });

            sortedFeatures.forEach((feature, index) => {
                // Guard geometry
                if (!feature || !feature.geometry || feature.geometry.type !== 'LineString') return;

                const coords = feature.geometry.coordinates || [];
                if (!Array.isArray(coords) || coords.length === 0) return;

                // Safe properties object
                const props = feature.properties || {};

                // Safe name/id/source
                const rawName = toStr(props.name, '').trim();
                const id = toStr(props.CFM_ID != null ? props.CFM_ID : (feature.id != null ? feature.id : (props.id != null ? props.id : `feat-${index}`)));
                const lineName = rawName || (id ? `Fault trace ${id}` : `Fault trace ${index}`);
                const source = toStr(props.source, '');

                // Numeric fields with fallbacks
                const upperDepth = coerceNumber(props.upper_depth, 0);
                const lowerDepth = coerceNumber(props.lower_depth, 0);
                const averageDepth = Math.abs((upperDepth + lowerDepth) / 2);
                const rake = coerceNumber(props.rake, 0);
                const dip = coerceNumber(props.avg_dip != null ? props.avg_dip : props.dip, 0);
                const slipRate = coerceNumber(props['NSHM23_sliprates'] != null ? props['NSHM23_sliprates'] : props['NSHM sliprates (MedWgtd)'], NaN);

                // Categorical fields
                const faultLevel = toStr(props.fault_level, '');
                const region = toStr(props.region, '');
                const slipSense = toStr(props.slip_sense, '');

                // Build Cesium positions (skip bad coords defensively)
                const positions = coords
                    .filter(c => Array.isArray(c) && Number.isFinite(c[0]) && Number.isFinite(c[1]))
                    .map(c => Cesium.Cartesian3.fromDegrees(c[0], c[1]));
                if (positions.length < 2) return; // need at least a segment

                // Averages
                const longitudes = positions.map(pos => Cesium.Cartographic.fromCartesian(pos).longitude * Cesium.Math.DEGREES_PER_RADIAN);
                const latitudes = positions.map(pos => Cesium.Cartographic.fromCartesian(pos).latitude * Cesium.Math.DEGREES_PER_RADIAN);
                const avgLon = longitudes.reduce((a, b) => a + b, 0) / longitudes.length;
                const avgLat = latitudes.reduce((a, b) => a + b, 0) / latitudes.length;

                // Safe description (properties may have been null)
                const safeEntries = Object.entries(props || {});
                const description =
                    (safeEntries.length ? safeEntries.map(([k, v]) => `${k}: ${v}`).join('<br>') : '(no properties)') +
                    `<br>average longitude: ${avgLon.toFixed(2)}<br>average latitude: ${avgLat.toFixed(2)}`;

                // Entity
                const lineEntity = viewer.entities.add({
                    polyline: { positions, material: Cesium.Color.BLACK, width: 3 },
                    name: lineName,
                    id: id,
                    show: true,
                    description,
                    averageLongitude: avgLon,
                    averageLatitude: avgLat,
                    averageDepth,
                    rake,
                    dip,
                    slipRate,
                    faultLevel,
                    region,
                    slipSense
                });
                entities[id] = lineEntity;

                // Row
                const listItem = document.createElement('tr');

                // checkbox
                const checkboxCell = document.createElement('td');
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `checkbox-${index}`;
                checkbox.value = id;
                checkbox.onchange = function () {
                    lineEntity.polyline.material = this.checked ? Cesium.Color.MAGENTA : Cesium.Color.BLACK;
                };
                checkboxCell.appendChild(checkbox);
                listItem.appendChild(checkboxCell);

                // eye icon
                const visibilityCell = document.createElement('td');
                const visibilityIcon = document.createElement('i');
                visibilityIcon.classList.add('fas', 'fa-eye');
                visibilityIcon.style.cursor = 'pointer';
                visibilityIcon.onclick = function () {
                    lineEntity.show = !lineEntity.show;
                    visibilityIcon.style.color = lineEntity.show ? 'black' : 'grey';
                };
                visibilityCell.appendChild(visibilityIcon);
                listItem.appendChild(visibilityCell);

                // name
                const nameCell = document.createElement('td');
                nameCell.textContent = lineName;
                listItem.appendChild(nameCell);

                // dip
                const dipCell = document.createElement('td');
                dipCell.textContent = Number.isFinite(dip) ? dip.toFixed(1) : '';
                listItem.appendChild(dipCell);

                // rake
                const rakeCell = document.createElement('td');
                rakeCell.textContent = Number.isFinite(rake) ? rake.toFixed(1) : '';
                listItem.appendChild(rakeCell);

                // fault level
                const levelCell = document.createElement('td');
                levelCell.textContent = faultLevel;
                listItem.appendChild(levelCell);

                // region
                const regionCell = document.createElement('td');
                regionCell.textContent = region;
                listItem.appendChild(regionCell);

                // id (hidden)
                const idCell = document.createElement('td');
                idCell.textContent = id;
                idCell.classList.add('hidden-id-column');
                listItem.appendChild(idCell);

                lineList.appendChild(listItem);
            });
        }



        function updateVisibility(entities, list) {
            var sv = getSliderValues();
            const minLongitude = sv.minLon;
            const maxLongitude = sv.maxLon;
            const minLatitude = sv.minLat;
            const maxLatitude = sv.maxLat;
            const minDepth = sv.minDepth;
            const maxDepth = sv.maxDepth;

            const rows = list.getElementsByTagName('tr');
            Object.keys(entities).forEach(id => {
                const entity = entities[id];
                const positions = entity.polyline.positions.getValue(Cesium.JulianDate.now());

                const longitudes = positions.map(pos => {
                    const cartographic = Cesium.Cartographic.fromCartesian(pos);
                    return cartographic.longitude * Cesium.Math.DEGREES_PER_RADIAN;
                });

                const latitudes = positions.map(pos => {
                    const cartographic = Cesium.Cartographic.fromCartesian(pos);
                    return cartographic.latitude * Cesium.Math.DEGREES_PER_RADIAN;
                });

                const avgLongitude = longitudes.reduce((a, b) => a + b, 0) / longitudes.length;
                const avgLatitude = latitudes.reduce((a, b) => a + b, 0) / latitudes.length;
                const depth = entity.averageDepth; // Assuming averageDepth is stored directly in the entity

                const isVisible = (avgLongitude >= minLongitude && avgLongitude <= maxLongitude) &&
                    (avgLatitude >= minLatitude && avgLatitude <= maxLatitude) &&
                    (depth >= minDepth && depth <= maxDepth);

                entity.show = isVisible;

                // Search for the row by ID instead of relying on position matching
                for (let i = 1; i < rows.length; i++) { // Start from 1 to skip header row
                    const rowId = rows[i].cells[rows[i].cells.length - 1].textContent; // Get ID from the last cell
                    if (rowId === id) {
                        rows[i].style.display = isVisible ? '' : 'none';
                        break; // Stop looping once the correct row is found and processed
                    }
                }
            });
        }

    });

    // Unpdate min, max color labels.
    function updateLabels() {
        const selector = document.getElementById('colorSelector');
        const minColorInput = document.getElementById('minColor');
        const maxColorInput = document.getElementById('maxColor');
        const minColorLabel = document.getElementById('minColorLabel');
        const maxColorLabel = document.getElementById('maxColorLabel');
        const minColorUnit = document.getElementById('minColorUnit');
        const maxColorUnit = document.getElementById('maxColorUnit');
        const colorNote = document.getElementById('colorBarNote');

        let unit = '';
        let note = '';
        switch (selector.value) {
            case 'DipColorMap':
                unit = ' °';
                minColorInput.disabled = false;
                maxColorInput.disabled = false;
                break;
            case 'RakeColorMap':
                unit = ' °';
                minColorInput.disabled = false;
                maxColorInput.disabled = false;
                note = "Note: Aki & Richards (1980) convention is used for rake"
                break;
            case 'SlipRateColorMap':
                unit = ' mm/yr';
                minColorInput.value = "";
                minColorInput.disabled = true;
                maxColorInput.value = "";
                maxColorInput.disabled = true;
                note = "Discrete bins (mm/yr)";
                break;
            case 'FaultLevelColor':
            case 'RegionColor':
            case 'SlipSenseColor':
                unit = '';
                minColorInput.value = "";
                minColorInput.disabled = true;
                maxColorInput.value = "";
                maxColorInput.disabled = true;
                note = "Colors assigned per category";
                break;
            default:
                unit = '';
                minColorInput.value = "";
                minColorInput.disabled = true;
                maxColorInput.value = "";
                maxColorInput.disabled = true;
                break;
        }


        minColorUnit.textContent = unit;
        maxColorUnit.textContent = unit;
        colorNote.textContent = note;
    }

    // Call updateLabels on page load to set initial values
    window.onload = updateLabels;

    // Make the map go full screen.
    function toggleFullScreen() {
        const elem = document.getElementById('mapContainer');
        alert("Press Esc to exit full screen")

        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.mozRequestFullScreen) { // Firefox
                elem.mozRequestFullScreen();
            } else if (elem.webkitRequestFullscreen) { // Chrome, Safari and Opera
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { // IE/Edge
                elem.msRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.mozCancelFullScreen) { // Firefox
                document.mozCancelFullScreen();
            } else if (document.webkitExitFullscreen) { // Chrome, Safari and Opera
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) { // IE/Edge
                document.msExitFullscreen();
            }
        }
    }



</script>
